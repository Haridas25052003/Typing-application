<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMaster — Typing Speed Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Ambient background orbs -->
<div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="app">

    <!-- ── Header ── -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">⌨</span>
            <span class="logo-text">type<span class="hi">master</span></span>
        </div>
        <div class="pb-chip" id="pbChip" title="Personal Best for current settings">
            <span class="pb-label">best</span>
            <span class="pb-wpm" id="pbWpm">--</span>
            <span class="pb-unit">wpm</span>
        </div>
    </header>

    <!-- ── Settings bar ── -->
    <nav class="settings-bar" id="settingsBar" aria-label="Test settings">

        <div class="settings-group">
            <span class="sg-label">mode</span>
            <div class="sg-btns" role="group" aria-label="Test mode">
                <button class="s-btn active" data-mode="time"  aria-pressed="true">time</button>
                <button class="s-btn"        data-mode="words" aria-pressed="false">words</button>
            </div>
        </div>

        <div class="s-sep"></div>

        <!-- Time options -->
        <div class="settings-group" id="timeOpts" aria-label="Duration">
            <div class="sg-btns" role="group">
                <button class="s-btn"        data-time="15">15</button>
                <button class="s-btn"        data-time="30">30</button>
                <button class="s-btn active" data-time="60">60</button>
                <button class="s-btn"        data-time="120">120</button>
            </div>
        </div>

        <!-- Word count options (hidden by default) -->
        <div class="settings-group hidden" id="wordOpts" aria-label="Word count">
            <div class="sg-btns" role="group">
                <button class="s-btn"        data-words="10">10</button>
                <button class="s-btn active" data-words="25">25</button>
                <button class="s-btn"        data-words="50">50</button>
                <button class="s-btn"        data-words="100">100</button>
            </div>
        </div>

        <div class="s-sep"></div>

        <div class="settings-group">
            <span class="sg-label">difficulty</span>
            <div class="sg-btns" role="group" aria-label="Difficulty">
                <button class="s-btn active" data-diff="easy"   aria-pressed="true">easy</button>
                <button class="s-btn"        data-diff="medium" aria-pressed="false">medium</button>
                <button class="s-btn"        data-diff="hard"   aria-pressed="false">hard</button>
            </div>
        </div>

    </nav>

    <!-- ── Typing Zone ── -->
    <section class="typing-zone" id="typingZone" aria-label="Typing test area">

        <!-- Live stats row -->
        <div class="live-bar" id="liveBar">
            <div class="l-stat">
                <span class="l-val" id="lWpm">0</span>
                <span class="l-lbl">wpm</span>
            </div>
            <div class="l-stat l-timer">
                <span class="l-val accent" id="lTimer">60</span>
                <span class="l-lbl" id="lTimerLabel">sec</span>
            </div>
            <div class="l-stat">
                <span class="l-val" id="lAcc">100</span>
                <span class="l-lbl">acc%</span>
            </div>
        </div>

        <!-- Text display -->
        <div class="text-wrap" id="textWrap">
            <div class="text-display" id="textDisplay">
                <!-- Character spans injected by JS -->
            </div>
            <!-- Smooth caret -->
            <div class="caret" id="caret" aria-hidden="true"></div>

            <!-- Overlay shown before test starts -->
            <div class="start-overlay" id="startOverlay">
                <div class="overlay-inner">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 8h.01M12 8h.01M16 8h.01M8 12h.01M12 12h.01M16 12h.01M8 16h4"/></svg>
                    <span id="overlayText">click here or press any key to start</span>
                </div>
            </div>
        </div>

        <!-- Hidden real input — captures keystrokes -->
        <input
                type="text"
                id="typingInput"
                class="typing-input"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="none"
                spellcheck="false"
                aria-label="Typing input"
                tabindex="0"
        >

    </section>

    <!-- ── Action buttons ── -->
    <div class="actions" id="actions">
        <button class="action-btn" id="restartBtn" title="Restart — Tab + Enter">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
            restart
        </button>
        <button class="action-btn" id="newTextBtn" title="Get new text">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            new text
        </button>
    </div>

    <!-- ── Results Screen ── -->
    <div class="results" id="results" aria-live="polite" aria-label="Test results">

        <div class="results-card">

            <!-- Header row -->
            <div class="rc-header">
                <div class="grade" id="gradeEl">--</div>
                <div class="rc-title-area">
                    <h2 class="rc-title">test complete</h2>
                    <p class="rc-feedback" id="feedbackEl">Keep it up!</p>
                </div>
                <div class="pb-new hidden" id="pbNew">🏆 new personal best!</div>
            </div>

            <!-- Big numbers -->
            <div class="big-stats">
                <div class="big-stat">
                    <div class="big-val" id="rWpm">0</div>
                    <div class="big-lbl">wpm</div>
                </div>
                <div class="big-sep"></div>
                <div class="big-stat">
                    <div class="big-val" id="rAcc">0%</div>
                    <div class="big-lbl">accuracy</div>
                </div>
            </div>

            <!-- Detail grid -->
            <div class="detail-grid">
                <div class="d-cell">
                    <span class="d-lbl">raw wpm</span>
                    <span class="d-val" id="rRaw">--</span>
                </div>
                <div class="d-cell">
                    <span class="d-lbl">errors</span>
                    <span class="d-val err-col" id="rErrors">--</span>
                </div>
                <div class="d-cell">
                    <span class="d-lbl">correct chars</span>
                    <span class="d-val" id="rCorrect">--</span>
                </div>
                <div class="d-cell">
                    <span class="d-lbl">time</span>
                    <span class="d-val" id="rTime">--</span>
                </div>
                <div class="d-cell">
                    <span class="d-lbl">mode</span>
                    <span class="d-val" id="rMode">--</span>
                </div>
                <div class="d-cell">
                    <span class="d-lbl">difficulty</span>
                    <span class="d-val" id="rDiff">--</span>
                </div>
            </div>

            <!-- CTA buttons -->
            <div class="rc-actions">
                <button class="btn-primary" id="tryAgainBtn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
                    try again
                </button>
                <button class="btn-secondary" id="newTestBtn">new test</button>
            </div>

        </div>
    </div>

    <!-- ── Footer ── -->
    <footer class="footer">
        <span class="kbd-hint"><kbd>tab</kbd> + <kbd>enter</kbd> restart</span>
        <span class="kbd-hint"><kbd>esc</kbd> reset</span>
        <span class="kbd-hint">click text to focus</span>
    </footer>

</div><!-- /.app -->

<script src="/js/app.js"></script>
</body>
</html>
