<!DOCTYPE html>
<html>
<head>
  <title>Typing Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Typing Speed Test</h1>

  <p><strong>Time Left:</strong> <span id="timer">60</span> seconds</p>

  <div id="text-box"></div>

  <textarea id="typing-area" placeholder="Start typing here..."></textarea>

  <div class="actions">
    <button id="submit-btn">Submit Test</button>
  </div>

  <p id="result"></p>
  <p id="final-result"></p>

  <script src="script.js"></script>
</body>
</html>
